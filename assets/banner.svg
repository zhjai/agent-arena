<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="Agent Arena — portable multi-agent debate skill">
  <defs>
    <linearGradient id="codexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#4c1d95"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="#0d1117"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#21262d" stroke-width="1.5"/>
  <line x1="0" y1="259" x2="1200" y2="259" stroke="#21262d" stroke-width="1.5"/>

  <!-- ── Codex box (left) ── -->
  <rect x="20" y="36" width="248" height="188" rx="10" fill="url(#codexGrad)" stroke="#30363d" stroke-width="1.5"/>
  <!-- header strip -->
  <rect x="20" y="36" width="248" height="42" rx="10" fill="#21262d"/>
  <rect x="20" y="62" width="248" height="16" fill="#21262d"/>
  <text x="144" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">OpenAI Codex</text>
  <!-- main label -->
  <text x="144" y="110" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="30" font-weight="700" fill="#e6edf3">Codex</text>
  <!-- separator -->
  <line x1="40" y1="126" x2="248" y2="126" stroke="#21262d" stroke-width="1"/>
  <!-- descriptors -->
  <text x="144" y="148" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#6e7681">source inspection · tests</text>
  <text x="144" y="168" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#6e7681">implementation feasibility</text>
  <text x="144" y="188" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#6e7681">structured diffs · CLI checks</text>

  <!-- ── Claude Code box (right) ── -->
  <rect x="932" y="36" width="248" height="188" rx="10" fill="url(#claudeGrad)" stroke="#4c1d95" stroke-width="1.5"/>
  <!-- header strip -->
  <rect x="932" y="36" width="248" height="42" rx="10" fill="#1a0533"/>
  <rect x="932" y="62" width="248" height="16" fill="#1a0533"/>
  <text x="1056" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" font-weight="600" fill="#7c3aed" letter-spacing="1">Anthropic</text>
  <!-- main label -->
  <text x="1056" y="104" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="24" font-weight="700" fill="#e6edf3">Claude Code</text>
  <!-- separator -->
  <line x1="952" y1="126" x2="1160" y2="126" stroke="#2e1065" stroke-width="1"/>
  <!-- descriptors -->
  <text x="1056" y="148" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#7c3aed">design critique · reframing</text>
  <text x="1056" y="168" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#7c3aed">long-context synthesis</text>
  <text x="1056" y="188" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11.5" fill="#7c3aed">red-team · evidence checking</text>

  <!-- ── Arrows ── -->
  <line x1="272" y1="130" x2="415" y2="130"
        stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"
        marker-end="url(#arrowGray)"/>
  <line x1="928" y1="130" x2="785" y2="130"
        stroke="#4c1d95" stroke-width="1.5" stroke-dasharray="6,4"
        marker-end="url(#arrowPurple)"/>

  <!-- ── Center content ── -->
  <!-- Title -->
  <text x="600" y="92" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="46" font-weight="800" fill="#f0f6fc" letter-spacing="-1">Agent Arena</text>

  <!-- Protocol flow -->
  <text x="600" y="122" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="12" fill="#484f58">independent → evidence → critique → synthesis</text>

  <!-- Divider -->
  <line x1="425" y1="138" x2="775" y2="138" stroke="#21262d" stroke-width="1"/>

  <!-- Principles -->
  <text x="600" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" fill="#8b949e">Evidence before consensus</text>
  <text x="600" y="184" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" fill="#8b949e">Dissent preserved · Heterogeneity required</text>

  <!-- Bottom version line -->
  <text x="600" y="230" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
        font-size="11" fill="#3d444d">portable skill · Claude Code · OpenAI Codex · Hermes Agent · v0.1.3</text>
</svg>
